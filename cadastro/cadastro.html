<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ByteSave - Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Lado esquerdo -->
      <div class="features-side">
        <div class="logo-area">
          <div class="logo">
            <img src="../imgs/logolobo.png" alt="ByteSave Logo" />
          </div>
          <span class="brand-name">ByteSave</span>
        </div>

        <ul class="features-list">
          <li class="feature-item">
            <span class="feature-icon">📋</span>
            <span>· ORGANIZE SUAS TAREFAS DE FORMA INTELIGENTE</span>
          </li>
          <li class="feature-item">
            <span class="feature-icon">📊</span>
            <span>· ACOMPANHE O PROGRESSO EM TEMPO REAL</span>
          </li>
          <li class="feature-item">
            <span class="feature-icon">👥</span>
            <span>· COLABORE COM SUA EQUIPE EFICIENTEMENTE</span>
          </li>
        </ul>
      </div>

      <!-- Lado direito -->
      <div class="auth-side">
        <h2 class="auth-title">CRIAR CONTA</h2>

        <form id="registerForm">
          <div class="form-group">
            <label class="form-label" for="nome">NOME COMPLETO</label>
            <input
              type="text"
              id="nome"
              class="form-input"
              placeholder="Digite seu nome completo"
            />
            <div class="field-error" id="nome-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">E-MAIL</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="Digite seu e-mail"
            />
            <div class="field-error" id="email-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="senha">SENHA</label>
            <input
              type="password"
              id="senha"
              class="form-input"
              placeholder="Digite sua senha"
            />
            <div class="field-error" id="senha-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-senha"
              >CONFIRMAR SENHA</label
            >
            <input
              type="password"
              id="confirm-senha"
              class="form-input"
              placeholder="Confirme sua senha"
            />
            <div class="field-error" id="confirm-error"></div>
          </div>

          <!-- Área para mensagens gerais -->
          <div id="message" class="message" style="display: none"></div>

          <button type="submit" class="btn-login">CRIAR CONTA</button>
        </form>

        <div class="divider">
          <span>ou</span>
        </div>

        <a href="../index.html" class="btn-create-link">
          <button class="btn-create">VOLTAR PARA LOGIN</button>
        </a>
      </div>
    </div>
    <script src="registro.js"></script>
  </body>
</html>
