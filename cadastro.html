<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteSave - Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Lado esquerdo -->
        <div class="features-side">
            <div class="logo-area">
                <div class="logo">
                    <img src="imgs/logolobo.png" alt="ByteSave Logo">
                </div>
                <span class="brand-name">ByteSave</span>
            </div>
            
            <ul class="features-list">
                <li class="feature-item">
                    <span class="feature-icon">📋</span>
                    <span>·ORGANIZE SUAS TAREFAS DE FORMA INTELIGENTE</span>
                </li>
                <li class="feature-item">
                    <span class="feature-icon">📊</span>
                    <span>·ACOMPANHE O PROGRESSO EM TEMPO REAL</span>
                </li>
                <li class="feature-item">
                    <span class="feature-icon">👥</span>
                    <span>·COLABORE COM SUA EQUIPE EFICIENTEMENTE</span>
                </li>
            </ul>
        </div>

        <!-- Lado direito -->
        <div class="auth-side">
            <h2 class="auth-title">CRIAR CONTA</h2>
            
            <div class="form-group">
                <label class="form-label">NOME COMPLETO</label>
                <input type="text" class="form-input" placeholder="Digite seu nome completo">
            </div>

            <div class="form-group">
                <label class="form-label">E-MAIL</label>
                <input type="email" class="form-input" placeholder="Digite seu e-mail">
            </div>

            <div class="form-group">
                <label class="form-label">SENHA</label>
                <input type="password" class="form-input" placeholder="Digite sua senha">
            </div>

            <div class="form-group">
                <label class="form-label">CONFIRMAR SENHA</label>
                <input type="password" class="form-input" placeholder="Confirme sua senha">
            </div>

            <a href="index.html">
            <button class="btn-login">CRIAR CONTA</button>
            </a>

            <div class="divider">
                <span>ou</span>
            </div>

            <a href="index.html">
                <button class="btn-create">VOLTAR PARA LOGIN</button>
            </a>
        </div>
    </div>
</body>
</html>
