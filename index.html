<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ByteSave - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <!-- LADO ESQUERDO -->
      <div class="features-side">
        <div class="logo-area">
          <div class="logo">
            <img src="imgs/logolobo.png" alt="ByteSave Logo" />
          </div>

          <span class="brand-name">ByteSave</span>
        </div>

        <ul class="features-list">
          <li class="feature-item">
            <span class="feature-icon">📋</span>
            <span>ORGANIZE SUAS TAREFAS DE FORMA INTELIGENTE</span>
          </li>

          <li class="feature-item">
            <span class="feature-icon">📊</span>
            <span>ACOMPANHE O PROGRESSO EM TEMPO REAL</span>
          </li>

          <li class="feature-item">
            <span class="feature-icon">👥</span>
            <span>COLABORE COM SUA EQUIPE EFICIENTEMENTE</span>
          </li>
        </ul>
      </div>

      <!-- LADO DIREITO -->
      <div class="auth-side">
        <h2 class="auth-title">LOGIN</h2>

        <div id="message" class="message"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label">E-MAIL</label>

            <input
              type="email"
              id="loginEmail"
              class="form-input"
              placeholder="seu@email.com"
              required
            />

            <p style="color: red" id="email-error" class="input-error"></p>
          </div>

          <div class="form-group">
            <label class="form-label">SENHA</label>

            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="********"
              required
            />

            <p style="color: red" id="password-error" class="input-error"></p>
          </div>

          <button type="submit" class="btn-login">ENTRAR</button>
        </form>

        <div class="divider">
          <span>ou</span>
        </div>

        <a href="cadastro/cadastro.html" class="btn-create">
          CRIAR NOVA CONTA
        </a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
